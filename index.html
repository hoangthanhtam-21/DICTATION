<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictation Practice App</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --bg-color: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1, h2 { text-align: center; color: var(--primary-color); }
        .section { display: none; }
        .active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], textarea, select {
            width: 100%; padding: 12px; box-sizing: border-box;
            border: 1px solid #bdc3c7; border-radius: 6px; font-size: 16px;
        }
        button {
            background-color: var(--secondary-color); color: white; border: none;
            padding: 14px 20px; border-radius: 6px; cursor: pointer;
            font-size: 16px; width: 100%; margin-top: 10px; font-weight: bold;
            transition: 0.2s;
        }
        button:hover { filter: brightness(1.1); }
        
        /* Practice Area */
        #media-container { width: 100%; margin-bottom: 20px; position: relative; }
        #youtube-player { width: 100%; aspect-ratio: 16/9; pointer-events: none; /* Prevent manual skipping */ }
        
        .feedback { margin-top: 15px; font-size: 18px; line-height: 1.6; min-height: 40px; padding: 15px; background: #f9f9f9; border-radius: 6px; border: 1px dashed #ccc;}
        .wrong { color: var(--danger-color); text-decoration: line-through; font-weight: bold; margin-right: 5px;}
        .correct { color: var(--success-color); font-weight: bold; margin-right: 5px;}
        .controls-row { display: flex; gap: 10px; margin-top: 15px; }
        .controls-row button { margin-top: 0; }
        
        /* Results */
        .result-box { text-align: center; font-size: 28px; font-weight: bold; margin-top: 20px; color: var(--primary-color); }
        
        .help-text { font-size: 13px; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="teacher-section" class="section active">
        <h1>Teacher Setup Panel</h1>
        
        <div class="form-group">
            <label for="topic">Lesson Topic:</label>
            <input type="text" id="topic" placeholder="e.g., Nature, Daily Life, Science...">
        </div>
        
        <div class="form-group">
            <label for="level">Difficulty Level:</label>
            <select id="level">
                <option value="pre-int">Pre-intermediate (Short chunks, ~6-10 words)</option>
                <option value="int">Intermediate (Longer chunks/sentences)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="youtube-url">YouTube Video URL:</label>
            <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        
        <div class="form-group">
            <label for="transcript">Transcript (with YouTube timestamps):</label>
            <textarea id="transcript" rows="10" placeholder="0:00&#10;now from Antarctica to the subarctic the&#10;0:03&#10;town of Churchill in Northern Canada is"></textarea>
            <div class="help-text">Please paste the transcript directly from YouTube including the timestamps (e.g., 0:00). This allows the system to auto-pause the video.</div>
        </div>
        
        <button onclick="generateExercise()">Create Dictation Exercise</button>
    </div>

    <div id="student-section" class="section">
        <h2 id="display-topic">Topic: </h2>
        <p style="text-align: center; font-style: italic; color: #7f8c8d;">Level: <span id="display-level"></span></p>
        
        <div id="media-container">
            <div id="youtube-player"></div>
        </div>

        <div class="controls-row">
            <button id="btn-play" onclick="playCurrentSegment()" style="background-color: #27ae60;">▶ Play Segment</button>
            <button id="btn-replay" onclick="playCurrentSegment()" style="background-color: #f39c12;">↺ Listen Again</button>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <label for="student-input">Type what you hear (Press ENTER to submit):</label>
            <input type="text" id="student-input" autocomplete="off" placeholder="Click 'Play Segment' to start listening...">
        </div>

        <div id="feedback-area" class="feedback">Your checked answer will appear here...</div>

        <div class="controls-row">
            <button id="btn-next" onclick="nextSegment()" style="background-color: #2980b9;">Next Segment ➔</button>
        </div>
        
        <div id="progress" style="margin-top: 20px; text-align: center; font-weight: bold; color: #7f8c8d;"></div>
        
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
        <button onclick="backToTeacher()" style="background-color: #95a5a6; width: auto; font-size: 14px; padding: 8px 15px;">Exit & Go Back</button>
    </div>

    <div id="result-section" class="section">
        <h1>Practice Completed!</h1>
        <div class="result-box">
            Overall Accuracy: <span id="accuracy-score" style="color: var(--success-color);">0%</span>
        </div>
        <p id="result-summary" style="text-align: center; font-size: 18px; margin-top: 20px;"></p>
        <button onclick="backToTeacher()" style="background-color: var(--secondary-color); margin-top: 30px;">Create New Exercise</button>
    </div>
</div>

<script>
    let ytPlayer = null;
    let isPlayerReady = false;
    let segments = [];
    let currentSegmentIndex = 0;
    
    let totalWordsCount = 0;
    let totalCorrectWordsCount = 0;
    let checkInterval;

    // Initialize YouTube API
    function onYouTubeIframeAPIReady() {
        // Will initialize player when exercise is generated
    }

    function getYoutubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // Function to convert "1:05" to 65 seconds
    function parseTime(timeStr) {
        let parts = timeStr.split(':').map(Number).reverse();
        return (parts[0] || 0) + (parts[1] || 0) * 60 + (parts[2] || 0) * 3600;
    }

    // Parse transcript with timestamps
    function processTranscript(text, level) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l);
        let rawSegments = [];
        let currentSec = 0;

        for(let i=0; i<lines.length; i++) {
            // Check if line is a timestamp (e.g. 0:00, 1:23, 10:05)
            if (/^(\d{1,2}:)?(\d{1,2}):(\d{2})$/.test(lines[i])) {
                currentSec = parseTime(lines[i]);
            } else {
                // If it's text, add to segments
                if(rawSegments.length > 0 && currentSec === rawSegments[rawSegments.length-1].start) {
                    rawSegments[rawSegments.length-1].text += " " + lines[i];
                } else {
                    rawSegments.push({ start: currentSec, text: lines[i] });
                }
            }
        }

        if(rawSegments.length === 0) return [];

        // Calculate end times for each segment based on the next segment's start time
        for(let i=0; i<rawSegments.length; i++) {
            rawSegments[i].end = (i < rawSegments.length - 1) ? rawSegments[i+1].start : rawSegments[i].start + 4; // Add 4 secs for the last chunk
        }

        let finalSegments = [];
        if (level === 'pre-int') {
            // Pre-intermediate: Keep original short YouTube chunks
            finalSegments = rawSegments;
        } else {
            // Intermediate: Group chunks together to make longer sentences (~15-25 words)
            let tempText = "";
            let tempStart = rawSegments[0].start;
            for(let i=0; i<rawSegments.length; i++) {
                tempText += (tempText ? " " : "") + rawSegments[i].text;
                let wordCount = tempText.split(/\s+/).length;
                
                // Group until we have at least 15 words, or if we reach the end
                if (wordCount >= 15 || i === rawSegments.length - 1) {
                    finalSegments.push({
                        start: tempStart,
                        end: rawSegments[i].end,
                        text: tempText
                    });
                    tempText = "";
                    if (i + 1 < rawSegments.length) {
                        tempStart = rawSegments[i+1].start;
                    }
                }
            }
        }
        return finalSegments;
    }

    function generateExercise() {
        const topic = document.getElementById('topic').value || "Untitled Lesson";
        const level = document.getElementById('level').value;
        const ytUrl = document.getElementById('youtube-url').value;
        const transcriptText = document.getElementById('transcript').value;
        
        const videoId = getYoutubeId(ytUrl);
        if(!videoId) {
            alert("Invalid YouTube URL! Please check again.");
            return;
        }
        if(!transcriptText.trim()) {
            alert("Please paste the transcript!");
            return;
        }

        // Process timestamps
        segments = processTranscript(transcriptText, level);
        if(segments.length === 0) {
            alert("Could not parse transcript. Make sure to include timestamps like 0:00");
            return;
        }

        currentSegmentIndex = 0;
        totalWordsCount = 0;
        totalCorrectWordsCount = 0;

        document.getElementById('display-topic').innerText = "Topic: " + topic;
        document.getElementById('display-level').innerText = level === 'pre-int' ? 'Pre-intermediate' : 'Intermediate';

        // Setup YouTube Player
        if(ytPlayer) {
            ytPlayer.loadVideoById(videoId);
        } else {
            ytPlayer = new YT.Player('youtube-player', {
                height: '100%', width: '100%', videoId: videoId,
                playerVars: { 
                    'autoplay': 0, 
                    'controls': 0, // Hide controls so students can't skip ahead
                    'disablekb': 1,
                    'rel': 0
                },
                events: {
                    'onReady': () => { isPlayerReady = true; }
                }
            });
        }

        switchSection('student-section');
        updateProgress();
        
        const studentInput = document.getElementById('student-input');
        studentInput.value = "";
        studentInput.dataset.checked = "false";
        document.getElementById('feedback-area').innerHTML = "Ready! Click 'Play Segment' to start.";
    }

    function updateProgress() {
        document.getElementById('progress').innerText = `Segment: ${currentSegmentIndex + 1} / ${segments.length}`;
    }

    // Play video from START to END time of current segment
    function playCurrentSegment() {
        if(!ytPlayer || typeof ytPlayer.seekTo !== 'function') return;
        
        let seg = segments[currentSegmentIndex];
        ytPlayer.seekTo(seg.start, true);
        ytPlayer.playVideo();
        
        // Clear previous interval if exists
        if(checkInterval) clearInterval(checkInterval);
        
        // Monitor time and auto-pause
        checkInterval = setInterval(() => {
            let currentTime = ytPlayer.getCurrentTime();
            if (currentTime >= seg.end) {
                ytPlayer.pauseVideo();
                clearInterval(checkInterval);
                document.getElementById('student-input').focus();
            }
        }, 100);
    }

    // Handle Enter Key
    document.getElementById('student-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    function cleanWord(word) {
        return word.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
    }

    function checkAnswer() {
        const studentInputEl = document.getElementById('student-input');
        const studentText = studentInputEl.value.trim();
        const correctText = segments[currentSegmentIndex].text;
        
        const studentWords = studentText.split(/\s+/).filter(w => w);
        const correctWords = correctText.split(/\s+/).filter(w => w);
        
        let feedbackHTML = "";
        let correctCount = 0;

        correctWords.forEach((cWord, idx) => {
            const sWord = studentWords[idx] || "";
            if(cleanWord(cWord) === cleanWord(sWord)) {
                feedbackHTML += `<span class="correct">${cWord}</span>`;
                correctCount++;
            } else {
                feedbackHTML += `<span class="wrong">${cWord}</span>`;
            }
        });

        document.getElementById('feedback-area').innerHTML = feedbackHTML;

        // Save scores temporarily
        studentInputEl.dataset.lastCorrectCount = correctCount;
        studentInputEl.dataset.lastTotalCount = correctWords.length;
        studentInputEl.dataset.checked = "true";
    }

    function nextSegment() {
        const inputEl = document.getElementById('student-input');
        
        // If they haven't checked answer, force check
        if(inputEl.dataset.checked === "false" && inputEl.value.trim() !== "") {
            checkAnswer();
        }

        // Add to total score
        const lastCorrect = parseInt(inputEl.dataset.lastCorrectCount || 0);
        const lastTotal = parseInt(inputEl.dataset.lastTotalCount || segments[currentSegmentIndex].text.split(/\s+/).filter(w=>w).length);
        
        totalCorrectWordsCount += lastCorrect;
        totalWordsCount += lastTotal;

        // Move to next segment
        currentSegmentIndex++;
        if(currentSegmentIndex < segments.length) {
            updateProgress();
            inputEl.value = "";
            inputEl.dataset.checked = "false";
            inputEl.dataset.lastCorrectCount = 0;
            inputEl.dataset.lastTotalCount = 0;
            document.getElementById('feedback-area').innerHTML = "Listening to next segment...";
            
            // Auto play next segment
            setTimeout(() => { playCurrentSegment(); }, 500);
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        switchSection('result-section');
        if(ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
        if(checkInterval) clearInterval(checkInterval);

        const accuracy = totalWordsCount > 0 ? Math.round((totalCorrectWordsCount / totalWordsCount) * 100) : 0;
        document.getElementById('accuracy-score').innerText = accuracy + "%";
        document.getElementById('result-summary').innerText = `You typed ${totalCorrectWordsCount} correct words out of ${totalWordsCount} total words.`;
    }

    function switchSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
    }

    function backToTeacher() {
        if(ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
        if(checkInterval) clearInterval(checkInterval);
        switchSection('teacher-section');
    }
</script>
</body>
</html>
